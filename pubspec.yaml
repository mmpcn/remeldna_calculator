name: remeldna_calculator
description: reMELD-Na Score Calculator with local history

publish_to: 'none'
version: 1.0.5+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  intl: ^0.20.2
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  path_provider: ^2.1.0
  file_picker: ^8.0.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/liver_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/liver_icon.png
