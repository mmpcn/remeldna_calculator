name: Build and Release APK + AAB

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK and AAB
    runs-on: ubuntu-latest

    steps:
      # 1 - Check out the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2 - Set up Java
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 3 - Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4 - Get dependencies
      - name: Get Flutter dependencies
        run: flutter pub get

      # 5 - Generate localizations
      - name: Generate localizations
        run: flutter gen-l10n

      # 6 - Decode keystore
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/remeldna_keystore.jks

      # 7 - Write key.properties
      - name: Write key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=remeldna_keystore.jks
          EOF

      # 8 - Build release APK (for direct sharing)
      - name: Build release APK
        run: flutter build apk --release

      # 9 - Build release AAB (for Google Play Store)
      - name: Build release AAB
        run: flutter build appbundle --release

      # 10 - Upload APK artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      # 11 - Upload AAB artifact
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

      # 12 - Create GitHub Release with both files
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          name: "reMELD-Na ${{ github.ref_name }}"
          body: |
            ## reMELD-Na ${{ github.ref_name }}

            ### Install on Android (direct)
            1. Download `app-release.apk` below
            2. Open it on your Android phone
            3. If prompted, allow installation from unknown sources
            4. Tap Install

            ### Google Play Store
            Download `app-release.aab` and upload it to Google Play Console.
