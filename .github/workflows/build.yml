name: Build and Release APK

on:
  push:
    tags:
      - 'v*'          # triggers on tags like v1.0.0, v1.1.0 etc.
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1 - Check out the code
      - name: Checkout repository
        uses: actions/checkout@v5

      # 2 - Set up Java (required by Android SDK)
      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      # 3 - Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # 4 - Get dependencies
      - name: Get Flutter dependencies
        run: flutter pub get

      # 5 - Decode and write the keystore from GitHub Secret
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/remeldna_keystore.jks

      # 6 - Write key.properties from GitHub Secrets
      - name: Write key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=remeldna_keystore.jks
          EOF

      # 7 - Build the release APK
      - name: Build release APK
        run: flutter build apk --release

      # 8 - Upload APK as build artifact (always available)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

      # 9 - Create a GitHub Release and attach the APK (only on tag push)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          name: "reMELD-Na ${{ github.ref_name }}"
          body: |
            ## reMELD-Na ${{ github.ref_name }}

            ### Install
            1. Download `app-release.apk` below
            2. Open it on your Android phone
            3. If prompted, allow installation from unknown sources
            4. Tap Install
